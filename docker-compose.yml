name: cognitrix

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cognitrix-api
    restart: unless-stopped
    environment:
      APP_NAME: Cognitrix API
      APP_ENV: production
      DATABASE_URL: sqlite:////app/data/uploads/state/ai_views.sqlite3
      MODEL_PROVIDER_URL: ${MODEL_PROVIDER_URL:-https://api.deepseek.com}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-120}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.deepseek.com/anthropic}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-deepseek-chat}
      API_TIMEOUT_MS: ${API_TIMEOUT_MS:-600000}
      AGENT_MAX_TOOL_STEPS: ${AGENT_MAX_TOOL_STEPS:-20}
      AGENT_MAX_SQL_ROWS: ${AGENT_MAX_SQL_ROWS:-2000}
      AGENT_MAX_SQL_SCAN_ROWS: ${AGENT_MAX_SQL_SCAN_ROWS:-10000}
      AGENT_TIMEOUT_SECONDS: ${AGENT_TIMEOUT_SECONDS:-120}
      AUTH_SECRET: docker-dev-secret
      USER_ACCOUNTS_ENABLED: "true"
      AUTH_REGISTRATION_ENABLED: "true"
      PASSWORD_MIN_LENGTH: "8"
      ACCESS_TOKEN_TTL_MIN: "120"
      INVITE_LINK_TTL_DAYS: "14"
      LEGACY_SERVICE_LOGIN_ENABLED: "true"
      AUTH_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:-}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      LOG_LEVEL: INFO
      UPLOAD_DIR: /app/data/uploads
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - cognitrix_upload_data:/app/data/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cognitrix-web
    restart: unless-stopped
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: docker-dev-secret
      LOG_LEVEL: INFO
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  cognitrix_upload_data:
